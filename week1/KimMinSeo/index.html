<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자기소개 페이지</title>
  </head>
  <body>
    <h1>김민서</h1>

    <h2 style="margin-top: 40px">기본 정보</h2>
    <p>
      안녕하세요! 저는 <strong>컴퓨터공학부</strong> 24학번 김민서입니다.<br />
      04년생이고 현재 <em>23살</em>입니다.
    </p>

    <p>
      제 MBTI는 <span style="color: skyblue">INFJ</span>이고,<br />
      고향은 <u>대전</u>입니다.
    </p>

    <h2 style="margin-top: 40px">취미 & 좋아하는 것</h2>
    <ul>
      <li>
        취미
        <ul>
          <li>산책</li>
          <li>드라마 보기</li>
        </ul>
      </li>
      <li>
        좋아하는 가수
        <ul>
          <li>데이식스</li>
        </ul>
      </li>
    </ul>

    <h2 style="margin-top: 40px">한마디</h2>
    <p>
      이번 한 학기 동안 <strong>열심히 배우고 성장하겠습니다!</strong><br />
      잘 부탁드립니다
    </p>

    <hr />
  </body>
</html>
