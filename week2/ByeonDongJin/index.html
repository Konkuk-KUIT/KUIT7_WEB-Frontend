<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danggn</title>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- 상단 헤더 -->
    <header class="info-header">
      <div class="info-header__title">나의 당근</div>
      <div class="info-header__icon">
        <button>
          <img src="assets/Settings.svg" alt="설정 버튼" />
        </button>
      </div>
    </header>
    <!-- 유저 정보 -->
    <article class="user-info">
      <section class="user-info__top">
        <div class="user-info__profile">
          <img src="assets/Frame 51.svg" alt="사용자 사진" class="user-img" />
          <div class="user-info__content">
            <span class="user-info__name">가나다</span>
            <span class="user-info__address">군자동 #123456789</span>
          </div>
        </div>

        <button>
          <img src="assets/Forward.png" alt="화살표 버튼" />
        </button>
      </section>
      <!---->
      <section class="user-info__middle">
        <div class="user-pay">
          <span class="user-pay__title">당근페이</span>
          <span class="user-pay__content"
            >중고거래는 이제 당근페이로 해보세요!</span
          >
        </div>
      </section>

      <section class="user-info__bottom">
        <div class="user-history">
          <div class="user-history__sales">
            <div class="history-back">
              <img
                src="assets/Bill.svg"
                alt="판매내역 사진"
                class="history-img"
              />
            </div>
            <span class="history-content">판매내역</span>
          </div>
          <div class="user-history__purchase">
            <div class="history-back">
              <img
                src="assets/Shopping.svg"
                alt="구매내역 사진"
                class="history-img"
              />
            </div>
            <span class="history-content">구매내역</span>
          </div>
          <div class="user-history__interest">
            <div class="history-back">
              <img
                src="assets/heart.svg"
                alt="관심목록 사진"
                class="history-img"
              />
            </div>
            <span class="history-content">관심목록</span>
          </div>
        </div>
      </section>
    </article>
    <!-- 나의 활동 -->
    <article class="my-activity">
      <section class="my-activity__title">나의 활동</section>
      <section class="my-activity__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        내 동네 설정
      </section>
      <section class="my-activity__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        동네 인증하기
      </section>
      <section class="my-activity__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        키워드 알림
      </section>
      <section class="my-activity__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        모아보기
      </section>
      <section class="my-activity__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        당근가계부
      </section>
    </article>
    <!-- 우리 동네 -->
    <article class="my-neighbor">
      <section class="my-neighbor__title">우리동네</section>
      <section class="my-neighbor__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        동네생활 글/댓글
      </section>
      <section class="my-neighbor__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        동네홍보 글
      </section>
      <section class="my-neighbor__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        동네 가게 후기
      </section>
      <section class="my-neighbor__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        저장한 장소
      </section>
      <section class="my-neighbor__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        내 단골 가게
      </section>
      <section class="my-neighbor__content">
        <img src="assets/News.svg" alt="뉴스 이미지" />
        받은 쿠폰함
      </section>
    </article>
    <!-- 하단 바 -->
    <footer class="menu">
      <div class="menu-option">
        <img src="assets/Home.svg" alt="집 이미지" class="menu-img" />
        <span class="menu-content">홈</span>
      </div>
      <div class="menu-option">
        <img src="assets/News.svg" alt="뉴스 이미지" class="menu-img" />
        <span class="menu-content">동네생활</span>
      </div>
      <div class="menu-option">
        <img
          src="assets/Place Marker.png"
          alt="플레이스 마커 이미지"
          class="menu-img"
        />
        <span class="menu-content">내 근처</span>
      </div>
      <div class="menu-option">
        <img src="assets/Chat.png" alt="채팅 이미지" class="menu-img" />
        <span class="menu-content">채팅</span>
      </div>
      <div class="menu-option">
        <img src="assets/User.png" alt="유저 이미지" class="menu-img" />
        <span class="menu-content">나의 당근</span>
      </div>
    </footer>
  </body>
</html>
