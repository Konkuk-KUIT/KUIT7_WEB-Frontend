<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danggn</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./reset.css">
</head>
<body>
    <!-- 상단바 -->
    <header class="my-header">
        <div class="my-header__mydanggn">나의 당근</div>
        <button>
            <img src="./asset/setting.svg" alt="설정 버튼" class="my-header__setting">
        </button>
    </header>
    <!-- 유저 정보 -->
    <section class="user-info">
        <div class="user-info__user">
            <img src="./asset/user.svg" alt="프로필 이미지" class="profile-img">
            <div class="user-info__text">
                <span class="user-name">가나다</span>
                <span class="user-id">군자동 #123456789</span>
            </div>
            <button class="my-header__edit-btn">
                <img src="./asset/arrow.svg" alt="편집 가기 버튼">
            </button>
        </div>
        <div class="pay">
            <span class="danggn-pay">당근페이</span>
            <span class="pay-text">중고거래는 이제 당근페이로 해보세요!</span>
        </div>
        <div class="three-icon">
            <div class="sell">
                <button class="sell_btn">
                    <img src="./asset/sell.svg" alt="판매 내역" class="sell-icon">
                </button>
                <span class="sell-text">판매내역</span>
            </div>
            <div class="buy">
                <button class="buy_btn">
                    <img src="./asset/buy.svg" alt="구매 내역" class="buy-icon">
                </button>
                <span class="sell-text">구매내역</span>
            </div>
            <div class="heart">
                <button class="heart_btn">
                    <img src="./asset/heart.svg" alt="관심 목록" class="heart-icon">
                </button>
                <span class="sell-text">관심목록</span>
            </div>
        </div>
    </section>
    <div class="divider"></div>
    <!--나의 활동 -->
    <section class="my-activity">
        <span class="my-activity__title">나의 활동</span>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">내 동네 설정</span>
            </button>
        </div>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">동네 인증하기</span>
            </button>
        </div>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">키워드 알림</span>
            </button>
        </div>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">모아보기</span>
            </button>
        </div>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">당근가계부</span>
            </button>
        </div>
    </section>
    <div class="divider"></div>
    <!-- 우리 동네 -->
    <section class="our-hood">
        <span class="our-hood__title">우리동네</span>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">동네생활 글/댓글</span>
            </button>
        </div>
        <div class="list-row">
            <button class="my-act__list">
                <img src="./asset/news.svg" alt="뉴스 이미지" class="news">
                <span class="act-text">동네홍보 글</span>
            </button>
        </div>
    </section>
    <!-- 하단바 -->
    <nav class="button-bar">
        <div class="bar-content">
            <button class="bar-btn">
                <img src="./asset/home.svg" alt="홈 버튼" class="home_bnt">  
            </button>
            <span class="nav__text">홈</span>
        </div>
        <div class="bar-content">
            <button class="bar-btn">
                <img src="./asset/news.svg" alt="동네생활 버튼" class="home-bnt">  
            </button>
            <span class="nav__text">동네생활</span>
        </div>
        <div class="bar-content">
            <button class="bar-btn">
                <img src="./asset/placeMarker.svg" alt="근처 버튼" class="home-bnt">
            </button>
            <span class="nav__text">내 근처</span>
        </div>
        <div class="bar-content">
            <button class="bar-btn">
                <img src="./asset/chat.svg" alt="채팅 버튼" class="home-bnt">
            </button>
            <span class="nav__text">채팅</span>
        </div>
        <div class="bar-content">
            <button class="bar-btn">
                <img src="./asset/mydan.svg" alt="나의 당근 버튼" class="home-bnt">
            </button>
            <span class="nav__text">나의 당근</span>
        </div>
    </nav>
</body>
</html>
